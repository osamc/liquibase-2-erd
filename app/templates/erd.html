<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERD – draw.io</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .toolbar a, .toolbar span {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .toolbar a:hover { text-decoration: underline; }
    .toolbar span { color: var(--muted); }
    .embed-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
      min-height: 500px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <a href="{{ url_for('index') }}">← Upload another changelog</a>
    <a href="{{ url_for('erd_download') }}">Download .drawio file</a>
    <span>{{ table_count }} table(s), {{ rel_count }} relationship(s)</span>
  </div>
  <div class="embed-wrap">
    <iframe
      id="drawio-frame"
      title="draw.io ERD"
      src="https://embed.diagrams.net/?embed=1&ui=min&nav=0&proto=json&spin=1"
      allowfullscreen
    ></iframe>
  </div>

  <script>
    (function() {
      var iframe = document.getElementById('drawio-frame');
      var xml = {{ drawio_xml | tojson }};

      function loadDiagram() {
        if (!iframe.contentWindow) return;
        try {
          var msg = JSON.stringify({ action: 'load', xml: xml });
          iframe.contentWindow.postMessage(msg, 'https://embed.diagrams.net');
        } catch (e) { console.warn(e); }
      }

      window.addEventListener('message', function(ev) {
        if (ev.origin !== 'https://embed.diagrams.net') return;
        try {
          var data = typeof ev.data === 'string' ? JSON.parse(ev.data) : ev.data;
          if (data && data.event === 'init') loadDiagram();
        } catch (_) {}
      });
    })();
  </script>
</body>
</html>
